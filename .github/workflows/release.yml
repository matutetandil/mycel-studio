name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/amd64
            artifact: MycelStudio-darwin-amd64
          - os: macos-latest
            platform: darwin/arm64
            artifact: MycelStudio-darwin-arm64
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: MycelStudio-linux-amd64
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            artifact: MycelStudio-linux-arm64
          - os: windows-latest
            platform: windows/amd64
            artifact: MycelStudio-windows-amd64.exe
          - os: windows-latest
            platform: windows/arm64
            artifact: MycelStudio-windows-arm64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          ls -la
          ditto -c -k --keepParent "Mycel Studio.app" ${{ matrix.artifact }}.zip

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: mv build/bin/MycelStudio build/bin/${{ matrix.artifact }}

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        run: mv build/bin/MycelStudio.exe build/bin/${{ matrix.artifact }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f | while read f; do
            sha256sum "$f" | sed "s|./[^/]*/||"
          done > ../checksums.txt
          cat ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.txt
